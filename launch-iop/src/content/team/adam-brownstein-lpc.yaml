name: Adam Brownstein, LPC
title: Co-Founder
order: 0
bio: >-
  Adam Brownstein, LPC, is a Houston-based psychotherapist and psychoanalyst who
  helps people understand the deeper emotional patterns that shape avoidance,
  disconnection, depression, trauma, and difficulty moving forward.


  At Launch IOP, Adam brings a depth-oriented, relational approach to young
  adults who feel stuck between adolescence and adulthood. His work is
  especially attuned to the inner conflicts that can make progress feel hard:
  shame, fear of failure, social withdrawal, family pressure, perfectionism, low
  motivation, and the painful sense of not knowing where to begin.


  Adam’s clinical background includes advanced training in psychoanalytic and
  psychodynamic psychotherapy, trauma, dissociation, and psychedelic-assisted
  psychotherapy. He serves as faculty at the Center for Psychoanalytic Studies
  of Texas and is Co-Chair of its Admissions Committee. He is also a board
  member of the Houston Psychoanalytic Society and teaches psychodynamic
  psychotherapy to psychiatry residents through Baylor College of Medicine and
  UT McGovern Medical School.


  At Launch, Adam helps create a therapeutic environment where young adults can
  begin to understand not only what they are avoiding, but why. His work
  emphasizes emotional honesty, self-understanding, relational growth, and the
  gradual development of a more independent and meaningful life.
