name: Claire Cooper, LCSW
title: Clinical Director
order: 3
bio: >-
  Claire Cooper, LCSW, is the Clinical Director of Launch IOP and a therapist at
  Houston Therapy who specializes in working with young adults, families,
  couples, and people navigating early adulthood challenges.


  Claire brings significant experience working with young adults who feel stuck,
  overwhelmed, disconnected, or unsure how to move forward. Her background
  includes clinical work at The Menninger Clinic, where she worked with
  individuals ages 18 to 30 and their families, as well as adults navigating
  complex psychiatric concerns, trauma, grief, family conflict, and major life
  transitions.


  At Launch IOP, Claire helps young adults build the emotional, relational, and
  practical skills needed to move toward greater independence. Her approach is
  compassionate, direct, and grounded in the understanding that avoidance,
  anxiety, depression, ADHD, family tension, and low motivation are often
  connected to deeper relational and emotional patterns.


  Claire’s clinical style is rooted in attachment theory and family systems, and
  she also draws from DBT, CBT, Internal Family Systems, and Emotionally Focused
  Therapy. She is especially attuned to the ways family dynamics, identity
  development, shame, trauma, and fear of failure can interfere with a young
  adult’s ability to take the next step.


  At Launch, Claire helps create a supportive therapeutic environment where
  young adults and families can better understand what keeps them stuck, reduce
  avoidance, strengthen emotional regulation, and begin building a more
  connected, capable, and meaningful adult life.
