name: Dana Boyko, LCSW
title: Therapist
order: 0
bio: >-
  Dana Boyko, LCSW, is a Licensed Clinical Social Worker at Houston Therapy who
  specializes in psychodynamic therapy, life transitions, trauma, grief,
  anxiety, depression, relationship distress, identity exploration, and
  family-of-origin concerns.


  At Launch IOP, Dana helps young adults who feel stuck, withdrawn, overwhelmed,
  or caught in patterns they do not fully understand. Her work is especially
  helpful for young adults navigating avoidance, shame, family conflict,
  identity development, relationship struggles, grief, trauma, and the emotional
  challenges of becoming more independent.


  Dana brings extensive experience facilitating group therapy in Intensive
  Outpatient Programs, including process groups, multi-family groups, and
  psychoeducational groups. This background makes her especially well-suited to
  Launch’s combination of individual growth, group support, family involvement,
  and practical movement toward adulthood.


  Dana’s clinical approach is grounded in psychodynamic therapy, while also
  integrating Cognitive Behavioral Therapy and mindfulness. She helps clients
  look beneath surface-level symptoms to understand how past experiences, family
  dynamics, relationships, and emotional patterns shape their current lives.


  At Launch, Dana helps create a thoughtful, supportive, and emotionally honest
  space where young adults can better understand what keeps them stuck, build
  stronger relationships, and begin moving toward greater independence,
  connection, and self-understanding.


  Texas Licensed Clinical Social Worker #66013
