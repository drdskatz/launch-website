name: Daniel Katz, Psy.D.
title: Co-Founder
order: 0
bio: >-
  Dr. Daniel Katz is a licensed psychologist (Texas License #36815) and Founder
  of Houston Therapy in Houston, Texas. He holds a Psy.D. in Clinical Psychology
  from The Wright Institute in Berkeley, California, and completed an
  APA-accredited doctoral internship at Pennsylvania State University's
  Counseling and Psychological Services.



  Dr. Katz has 19 years of experience in the mental health field, including 12
  years as a licensed psychologist. He has worked across a wide range of
  settings including private practice, college counseling, forensics, crisis,
  alcohol and drug rehabilitation, community mental health, psychiatric
  hospitalization, career counseling, and psychological assessment.



  He is currently training as a Psychoanalytic Candidate at the Center for
  Psychoanalytic Studies in Houston, one of the most rigorous postgraduate
  clinical training pathways available to psychologists. Dr. Katz is authorized
  for the Authority to Practice Interjurisdictional Telepsychology (APIT)
  through PSYPACT, allowing him to provide telepsychology services in all
  PSYPACT participating states.



  Dr. Katz co-founded two specialized programs alongside Adam Brownstein. The
  first is Approach IOP, a six-week intensive outpatient program designed
  specifically for individuals struggling with social anxiety disorder, avoidant
  personality traits, withdrawal, and isolation. The second is the Launch
  Comprehensive Program, developed for young adults who are having difficulty
  transitioning into adulthood and independent living. Both programs reflect Dr.
  Katz's commitment to creating specialized, structured care for populations
  that are often underserved by traditional therapy formats.



  Dr. Katz is on the Board the Houston Psychological Association (Board Member),
  and is an active member in the American Psychological Association, the
  American Psychoanalytic Association, and the Houston


  Psychoanalytic Society.
