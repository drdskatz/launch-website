name: Daniel Katz, Psy.D.
title: Co-Founder
order: 1
bio: >-
  Dr. Daniel Katz is a licensed psychologist and the Founder of Houston Therapy.
  He has 19 years of experience in the mental health field, including 12 years
  as a licensed psychologist, and has worked across private practice, college
  counseling, psychiatric hospitalization, crisis work, substance use treatment,
  psychological assessment, career counseling, and community mental health
  settings.


  At Launch IOP, Dr. Katz helps young adults who feel stuck, avoidant,
  overwhelmed, or unsure how to move forward into adult life. His work is
  especially focused on young adults struggling with executive dysfunction,
  social anxiety, depression, ADHD, avoidance, family pressure, shame, and
  difficulty building independence.


  Dr. Katz’s clinical approach is integrative, depth-oriented, and practical. He
  believes people are best understood in the full context of their lives,
  including their relationships, family history, physical health, identity,
  culture, past experiences, and current environment. His work helps clients
  better understand the patterns keeping them stuck while also building the
  structure, confidence, and emotional capacity needed to take meaningful next
  steps.


  Dr. Katz holds a Psy.D. in Clinical Psychology from The Wright Institute in
  Berkeley, California, and completed his APA-accredited doctoral internship at
  Pennsylvania State University’s Counseling and Psychological Services. He is
  currently a psychoanalytic candidate at the Center for Psychoanalytic Studies
  in Houston and is authorized through PSYPACT to provide telepsychology in
  participating states.


  He co-founded Launch IOP with Adam Brownstein as a specialized program for
  young adults struggling with the transition into adulthood and independent
  living. He also co-founded Approach IOP, a program for social anxiety,
  avoidant personality traits, withdrawal, and isolation.


  At Launch, Dr. Katz helps create a thoughtful, structured, and emotionally
  honest environment where young adults can move from avoidance and self-doubt
  toward independence, connection, and a more meaningful adult life.
