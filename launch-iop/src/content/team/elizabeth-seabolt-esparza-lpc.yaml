name: Elizabeth Seabolt-Esparza, LPC
title: Therapist
order: 5
bio: >-
  Elizabeth Seabolt-Esparza, LPC, is a trauma-informed therapist at Houston
  Therapy with 9 years of counseling experience. She works with adults and
  adolescents ages 16 and older, with specialties including trauma, PTSD,
  dissociation, grief, depression, ADHD, autism spectrum disorder, addiction and
  recovery, sleep disorders, and LGBTQ+ affirming care.


  At Launch IOP, Elizabeth helps young adults who feel stuck, overwhelmed,
  avoidant, or disconnected begin to understand the emotional and relational
  patterns that may be getting in the way of growth. Her work is especially
  helpful for young adults navigating trauma, identity development, ADHD,
  autism, shame, sleep disruption, depression, anxiety, and difficulty building
  a more independent life.


  Elizabeth’s approach is integrative, person-centered, and grounded in the
  belief that therapy can help people reconnect with their own resilience. She
  draws from EMDR, Brainspotting, Internal Family Systems, DBT, CBT-I, and
  Ketamine Assisted Psychotherapy, tailoring treatment to the needs, goals, and
  lived experience of each client.


  Before joining Houston Therapy, Elizabeth spent five years at the Montrose
  Center working with survivors of trauma, addiction, depression, and grief,
  with a specialization in LGBTQ+ issues, gender identity exploration, and
  gender-affirming care. She earned her M.Ed. in Counseling Psychology from the
  University of Houston.


  At Launch, Elizabeth helps create a supportive, affirming, and emotionally
  honest space where young adults can better understand what keeps them stuck
  and begin moving toward greater self-acceptance, connection, stability, and
  independence.


  Licensure: Texas Licensed Professional Counselor #81652.
