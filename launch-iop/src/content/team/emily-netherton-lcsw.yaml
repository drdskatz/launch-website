name: Emily Netherton, LCSW
title: Therapist
order: 8
bio: >-
  Emily Netherton, LCSW, is a psychotherapist providing individual, couples, and
  family therapy in Houston, Texas. She works with clients navigating anxiety,
  depression, relationship difficulties, pregnancy, prenatal and postpartum
  concerns, mood disorders, personality disorders, body image issues, grief, and
  general life stressors.


  At Launch IOP, Emily helps young adults who feel stuck, overwhelmed, avoidant,
  or uncertain about how to move forward into adult life. Her work is especially
  relevant for young adults struggling with anxiety, depression, relationship
  stress, family conflict, identity development, grief, self-image concerns, and
  the emotional challenges that can make independence feel difficult.


  Emily draws from a range of therapeutic approaches, including psychodynamic
  psychotherapy, Cognitive Behavioral Therapy, Dialectical Behavioral Therapy,
  and Emotion Focused Therapy. Her style is thoughtful, relational, and
  individualized, helping clients better understand the emotional patterns,
  relationship dynamics, and internal conflicts that shape how they move through
  the world.


  Emily earned her undergraduate degree in Psychology from the University of
  Tennessee and her master’s degree in Social Work from the University of
  Houston. Following graduate school, she completed a two-year clinical
  fellowship at The Lovett Center and a two-year psychodynamic psychotherapy
  training at the Houston Center for Psychoanalytic Studies.


  At Launch, Emily helps create a supportive and emotionally honest space where
  young adults can better understand themselves, strengthen relationships,
  reduce avoidance, and begin taking meaningful steps toward a more independent
  and connected adult life.


  Texas Licensed Clinical Social Worker #64276
