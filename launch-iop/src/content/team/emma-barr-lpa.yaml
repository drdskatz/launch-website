name: Emma Barr, LPA
title: Therapist
order: 0
bio: >-
  Emma Barr, LPA, BCN, is a Licensed Psychological Associate at Houston Therapy
  with a background in clinical psychology, neuropsychology, neurofeedback, and
  evidence-based psychotherapy.


  At Launch IOP, Emma helps young adults who feel stuck, overwhelmed, avoidant,
  disconnected from their emotions, or unsure how to move forward. Her work is
  especially helpful for young adults struggling with anxiety, depression,
  stress, burnout, sleep problems, self-criticism, life transitions, and
  difficulty understanding or regulating emotions.


  Emma’s approach is compassionate, collaborative, and practical. She helps
  clients move away from fighting with their emotions and toward curiosity,
  self-compassion, and meaningful action. She draws from Acceptance and
  Commitment Therapy, Cognitive Behavioral Therapy, CBT-I, and Interpersonal
  Psychotherapy.


  Emma also brings a neuropsychological lens to her clinical work. Her
  background in neurofeedback and neuropsychology helps her pay attention to the
  biological, cognitive, and sleep-related factors that can affect mood,
  motivation, attention, and functioning.


  At Launch, Emma helps young adults better understand what is happening
  internally, build skills for emotional regulation and self-acceptance, and
  take realistic steps toward a more independent and meaningful life.


  Texas Licensed Psychological Associate #39767
