name: Shea McTaggart, Psy.D.
title: Assessment
order: 4
bio: >-
  Dr. Shea McTaggart is a licensed psychologist and Director of Psychological
  Assessment at Houston Therapy. He brings more than 23 years of clinical
  experience across community mental health, inpatient and outpatient
  psychiatric and substance use programs, state psychiatric hospitals, and acute
  medical and rehabilitation settings. He is licensed as a psychologist in both
  Texas and Colorado.


  At Launch IOP, Dr. McTaggart helps young adults and families better understand
  the psychological, neurodevelopmental, and emotional factors that may be
  contributing to avoidance, executive dysfunction, anxiety, depression, low
  motivation, school or work difficulties, and problems with independence.


  His areas of specialization include neuropsychological assessment, clinical
  assessment, ADHD and executive dysfunction, bipolar disorder, psychosis and
  thought disorders, trauma, addiction and recovery, life transitions, and
  complex clinical presentations.


  Dr. McTaggart’s approach emphasizes looking beneath the surface of symptoms to
  understand patterns in emotion, self-concept, relationships, behavior, and
  life history. At Launch, his assessment-informed perspective helps the team
  clarify what a young adult is struggling with, what kind of support they need,
  and how to help them move toward greater functioning, confidence, and
  independence.


  Dr. McTaggart earned his Psy.D. in Clinical Psychology from The Wright
  Institute, his M.A. in Counseling Psychology from the University of Colorado
  at Denver, and completed an APA-accredited postdoctoral fellowship in
  Rehabilitation Psychology at Hurley Medical Center.


  Licensure: Texas Licensed Psychologist #38719; Colorado Licensed Psychologist
  #0004271.
